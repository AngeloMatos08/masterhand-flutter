name: masterhand
description: Catálogo de sistemas de RPG brasileiros — MasterHand
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  drift: ^2.18.0
  flutter:
    sdk: flutter
  go_router: ^14.0.0
  path: ^1.9.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  sqlite3_flutter_libs: ^0.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  flutter_launcher_icons: ^0.11.0
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter_icons:
  android: true
  ios: true
  image_path: "Master-Hand-logo-iOS-Default-1024x1024@1x.png"

flutter:
  uses-material-design: true
  assets:
    - assets/database/
